<!DOCTYPE html>
<html lang="en" class="dark">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>VisDir</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script>
      tailwind.config = {
         darkMode: 'class'
      }
   </script>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   <style>
      .entity-card {
         transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .entity-card:hover {
         transform: translateY(-4px);
         box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      }

      .thumbnail {
         height: 280px;
         object-fit: cover;
      }
   </style>

   <!-- SEO -->
   <meta name="description"
      content="A clean, modern visual directory template with live thumbnails and interactive map.">
   <meta property="og:title" content="VisDir">
   <meta property="og:description" content="Build beautiful visual directories with one JSON file.">
   <meta property="og:type" content="website">
   <meta property="og:url" content="https://yourdomain.com">
   <link rel="canonical" href="https://yourdomain.com">
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans">

   <!-- NAV -->
   <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
         <div class="flex items-center gap-x-3" id="nav-brand"></div>
         <div class="flex items-center gap-x-8">
            <a href="index.html" class="hover:text-amber-600 font-medium">Directory</a>
            <a href="map.html" class="hover:text-amber-600 font-medium">Map</a>
            <a href="contact.html" class="hover:text-amber-600 font-medium">Contact</a>
            <button onclick="toggleDarkMode()"
               class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition"
               aria-label="Toggle dark mode">
               <i id="theme-icon" class="fa-solid fa-moon text-slate-600 dark:text-slate-400"></i>
            </button>
         </div>
      </div>
   </nav>

   <div class="max-w-7xl mx-auto px-6 py-12">
      <div class="text-center mb-16">
         <h1 id="site-name" class="text-5xl font-bold mb-4"></h1>
         <p id="site-slogan" class="text-xl text-slate-600 dark:text-slate-400 max-w-2xl mx-auto"></p>
      </div>

      <div id="status" class="text-center py-8"></div>

      <div id="entity-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
   </div>

   <!-- FOOTER -->
   <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-8">
      <div class="max-w-7xl mx-auto px-6 text-center">
         <p id="motto-text" class="text-lg font-medium text-amber-600"></p>
         <p id="footer-text" class="mt-3 text-xs text-slate-500 dark:text-slate-400"></p>
      </div>
   </footer>

   <script>
      function toggleDarkMode() {
         const html = document.documentElement;
         html.classList.toggle('dark');
         localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
         updateThemeIcon();
      }

      function updateThemeIcon() {
         const icon = document.getElementById('theme-icon');
         icon.classList.toggle('fa-moon', !document.documentElement.classList.contains('dark'));
         icon.classList.toggle('fa-sun', document.documentElement.classList.contains('dark'));
      }

      function initTheme() {
         if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
         } else {
            document.documentElement.classList.remove('dark');
         }
         updateThemeIcon();
      }

      function renderSiteAndEntities() {
         fetch('data.json?' + Date.now())
            .then(r => r.json())
            .then(data => {
               const site = data.site || {};

               document.getElementById('nav-brand').innerHTML = `
                        ${site.logo_svg || ''}
                        <h1 class="text-2xl font-bold">${site.name || 'VisDir'}</h1>
                    `;

               document.getElementById('site-name').textContent = site.name || 'VisDir';
               document.getElementById('site-slogan').textContent = site.slogan || '';
               document.getElementById('motto-text').textContent = site.motto || '';

               const maintainer = site.maintainer;
               const showContact = site.show_contact === true;
               const supportUrl = site.support_url;
               const supportLabel = site.support_label;
               const visdirLink = '<a href="https://github.com/seancrites/visdir" target="_blank" class="hover:text-amber-600">VisDir</a>';

               const parts = [];
               if (maintainer) {
                  parts.push(`Maintained by ${maintainer}`);
               }
               if (showContact) {
                  parts.push('<a href="contact.html" class="hover:text-amber-600">Contact</a>');
               }
               if (supportUrl && supportLabel) {
                  parts.push(`<a href="${supportUrl}" target="_blank" class="hover:text-amber-600">${supportLabel}</a>`);
               }
               parts.push(`Built with ${visdirLink}`);

               document.getElementById('footer-text').innerHTML = parts.join(' • ');

               renderEntities(data.entities || [], site);
            });
      }

      function renderEntities(entities, site) {
         const grid = document.getElementById('entity-grid');
         grid.innerHTML = '';

         entities.forEach(entity => {
            if (!entity.website) return;

            const card = document.createElement('div');
            card.className = 'entity-card bg-white dark:bg-slate-900 rounded-2xl shadow overflow-hidden border border-slate-100 dark:border-slate-700';

            const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(entity.address + ', ' + entity.city)}`;

            card.innerHTML = `
                    <img src="thumbnails/${entity.slug}.png" alt="${entity.name}" class="thumbnail w-full" onerror="this.src='https://via.placeholder.com/480x280/cccccc/666666?text=No+Thumbnail';">
                    <div class="p-6">
                        <h3 class="text-2xl font-semibold">${entity.name}</h3>
                        <p class="text-sm text-slate-600 dark:text-slate-400 mt-1">${entity.address}</p>

                        ${entity.contact_name ? `
                        <div class="mt-4 text-sm">
                            <strong>${(site && site.contact_label) || 'Contact'}:</strong> ${entity.contact_name}
                             ${entity.contact_email ? `<br><a href="mailto:${entity.contact_email}" class="text-slate-500 dark:text-slate-400 hover:underline">${entity.contact_email}</a>` : ''}
                        </div>` : ''}

                        <div class="mt-6 flex flex-wrap gap-x-6 gap-y-3 text-sm">
                            ${entity.phone ? `<div class="flex items-center"><i class="fa-solid fa-phone mr-2 text-slate-400"></i><a href="tel:${entity.phone.replace(/[^0-9+]/g, '')}" class="hover:underline">${entity.phone}</a></div>` : ''}
                            ${entity.email ? `<div class="flex items-center"><i class="fa-solid fa-envelope mr-2 text-slate-400"></i><a href="mailto:${entity.email}" class="hover:underline">${entity.email}</a></div>` : ''}
                            ${entity.school && entity.school.trim() ? `<div class="flex items-center"><i class="fa-solid fa-school mr-2 text-slate-400"></i><a href="${entity.school}" target="_blank" class="hover:underline">${entity.school}</a></div>` : ''}
                        </div>

                        <a href="${googleMapsUrl}" target="_blank" class="inline-flex items-center text-amber-600 hover:text-amber-700 mt-3"><i class="fa-solid fa-map-marker-alt mr-2"></i>View on Map</a>
                        <a href="${entity.website}" target="_blank" class="mt-6 inline-flex items-center justify-center w-full bg-slate-900 dark:bg-slate-100 dark:text-slate-900 text-white py-3 rounded-xl hover:bg-slate-800 font-medium">Visit Website →</a>
                    </div>
                `;
            grid.appendChild(card);
         });
      }

      window.onload = () => {
         initTheme();
         renderSiteAndEntities();
      };
   </script>
</body>

</html>
