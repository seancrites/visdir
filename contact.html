<!DOCTYPE html>
<html lang="en" class="dark">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Contact - WELS Alaska</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script>
      tailwind.config = {
         darkMode: 'class'
      }
   </script>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   <style>
      .form-input {
         transition: all 0.2s;
      }

      .form-input:focus {
         box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.3);
      }
   </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans">

   <!-- NAV -->
   <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
         <div class="flex items-center gap-x-3" id="nav-brand"></div>
         <div class="flex items-center gap-x-8">
            <a href="index.html" class="hover:text-amber-600 font-medium">Churches</a>
            <a href="map.html" class="hover:text-amber-600 font-medium">Interactive Map</a>
            <a href="contact.html" class="text-amber-600 font-medium">Contact Me</a>
            <button onclick="toggleDarkMode()"
               class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition"
               aria-label="Toggle dark mode">
               <i id="theme-icon" class="fa-solid fa-moon text-slate-600 dark:text-slate-400"></i>
            </button>
         </div>
      </div>
   </nav>

   <div class="max-w-2xl mx-auto px-6 py-16">
      <h1 class="text-4xl font-bold text-center mb-3">Contact Us</h1>
      <p class="text-center text-slate-600 dark:text-slate-400 mb-10">Need to report a change, add a church, or have
         feedback? Send us a message.</p>

      <div id="status-message" class="hidden mb-8 rounded-2xl p-6 text-center"></div>

      <form action="contact.php" method="POST" class="space-y-6 bg-white dark:bg-slate-900 p-8 rounded-3xl shadow">
         <!-- Honeypot anti-spam -->
         <input type="text" name="honeypot" style="display:none" tabindex="-1" autocomplete="off">

         <div>
            <label class="block text-sm font-medium mb-1">Your Name</label>
            <input type="text" name="name" required
               class="form-input w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none">
         </div>

         <div>
            <label class="block text-sm font-medium mb-1">Email Address</label>
            <input type="email" name="email" required
               class="form-input w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none">
         </div>

         <div>
            <label class="block text-sm font-medium mb-1">Message</label>
            <textarea name="message" rows="6" required
               class="form-input w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:outline-none"></textarea>
         </div>

         <button type="submit"
            class="w-full bg-slate-900 hover:bg-amber-600 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-amber-600 text-white py-5 rounded-2xl font-semibold text-lg transition">
            Send Message
         </button>
      </form>
   </div>

   <!-- FOOTER -->
   <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-8">
      <div class="max-w-7xl mx-auto px-6 text-center">
         <p id="motto-text" class="text-lg font-medium text-amber-600"></p>
         <p id="footer-text" class="mt-3 text-xs text-slate-500 dark:text-slate-400"></p>
      </div>
   </footer>

   <script>
      function toggleDarkMode() {
         const html = document.documentElement;
         html.classList.toggle('dark');
         localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
         updateThemeIcon();
      }

      function updateThemeIcon() {
         const icon = document.getElementById('theme-icon');
         icon.classList.toggle('fa-moon', !document.documentElement.classList.contains('dark'));
         icon.classList.toggle('fa-sun', document.documentElement.classList.contains('dark'));
      }

      function initTheme() {
         if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
         } else {
            document.documentElement.classList.remove('dark');
         }
         updateThemeIcon();
      }

      fetch('data.json?' + Date.now())
         .then(r => r.json())
         .then(data => {
            const site = data.site || {};

            document.getElementById('nav-brand').innerHTML = `
                     ${site.luther_rose_svg || site.logo_svg || ''}
                     <h1 class="text-2xl font-bold">${site.name || 'WELS Alaska'}</h1>
                 `;

            document.getElementById('motto-text').textContent = site.motto || '';

            const maintainer = site.maintainer;
            const showContact = site.show_contact === true;
            const supportUrl = site.support_url;
            const supportLabel = site.support_label;
            const visdirLink = '<a href="https://github.com/seancrites/visdir" target="_blank" class="hover:text-amber-600">VisDir</a>';

            const parts = [];
            if (maintainer) {
               parts.push(`Maintained by ${maintainer}`);
            }
            if (showContact) {
               parts.push('<a href="contact.html" class="hover:text-amber-600">Contact Me</a>');
            }
            if (supportUrl && supportLabel) {
               parts.push(`<a href="${supportUrl}" target="_blank" class="hover:text-amber-600">${supportLabel}</a>`);
            }
            parts.push(`Built with ${visdirLink}`);

            document.getElementById('footer-text').innerHTML = parts.join(' • ');
         });

      function showStatusMessage() {
         const urlParams = new URLSearchParams(window.location.search);
         const status = urlParams.get('status');
         const div = document.getElementById('status-message');

         if (status === 'success') {
            div.className = 'bg-emerald-100 dark:bg-emerald-900 text-emerald-700 dark:text-emerald-300 p-6 rounded-2xl text-center mb-8';
            div.innerHTML = '✅ Thank you! Your message has been sent successfully.';
            div.classList.remove('hidden');
         } else if (status === 'error') {
            div.className = 'bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300 p-6 rounded-2xl text-center mb-8';
            div.innerHTML = '❌ Sorry, something went wrong. Please try again.';
            div.classList.remove('hidden');
         }
      }

      window.onload = () => {
         initTheme();
         showStatusMessage();
      };
   </script>
</body>

</html>
